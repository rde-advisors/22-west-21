<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <!-- RDE Advisors building mark — white-on-dark variant -->
  <g fill="#ffffff">
    <rect x="20" y="100" width="40" height="100" rx="2"/>
    <rect x="70" y="50" width="40" height="150" rx="2"/>
    <rect x="120" y="20" width="40" height="180" rx="2"/>
  </g>
  <!-- Distinctive blue accent -->
  <rect x="78" y="150" width="24" height="40" fill="#2D8CFF" rx="1"/>
  <text x="100" y="230" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-weight="700" font-size="17" fill="#ffffff">RDE Advisors, Inc.</text>
</svg>
