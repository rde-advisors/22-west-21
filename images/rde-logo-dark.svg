<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <!-- RDE Advisors building mark - dark-on-light variant -->
  <g fill="#14110d">
    <rect x="20" y="100" width="40" height="100" rx="2"/>
    <rect x="70" y="50" width="40" height="150" rx="2"/>
    <rect x="120" y="20" width="40" height="180" rx="2"/>
  </g>
  <!-- Forest-green accent (matches site palette) -->
  <rect x="78" y="150" width="24" height="40" fill="#2d5a3d" rx="1"/>
  <text x="100" y="230" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="17" fill="#14110d">RDE Advisors, Inc.</text>
</svg>